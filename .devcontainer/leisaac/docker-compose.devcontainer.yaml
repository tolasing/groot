services:
  isaac-lab-leisaac:
    image: isaac-lab-leisaac
    container_name: isaac-lab-leisaac
    environment:
      - ISAACSIM_PATH=/workspace/isaaclab/_isaac_sim
      - OMNI_KIT_ALLOW_ROOT=1
      - ACCEPT_EULA=Y
    volumes:
      - type: bind
        source: ../../
        target: /groot_ws
      - type: volume
        source: isaac-cache-kit
        target: /isaac-sim/kit/cache
      - type: volume
        source: isaac-cache-ov
        target: /root/.cache/ov
      - type: volume
        source: isaac-cache-pip
        target: /root/.cache/pip
      - type: volume
        source: isaac-cache-gl
        target: /root/.cache/nvidia/GLCache
      - type: volume
        source: isaac-cache-compute
        target: /root/.nv/ComputeCache
      - type: volume
        source: isaac-logs
        target: /root/.nvidia-omniverse/logs
      - type: volume
        source: isaac-carb-logs
        target: /isaac-sim/kit/logs/Kit/Isaac-Sim
      - type: volume
        source: isaac-data
        target: /root/.local/share/ov/data
      - type: volume
        source: isaac-docs
        target: /root/Documents
    devices:
      - /dev/input:/dev/input
    device_cgroup_rules:
      - 'c 13:* rmw'
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: bash
    stdin_open: true
    tty: true

volumes:
  isaac-cache-kit:
  isaac-cache-ov:
  isaac-cache-pip:
  isaac-cache-gl:
  isaac-cache-compute:
  isaac-logs:
  isaac-carb-logs:
  isaac-data:
  isaac-docs:
